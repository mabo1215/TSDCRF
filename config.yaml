device: "cuda"          # "cpu" or "cuda"
fp16: true

yolox:
  exp_file: null        # Kept for compatibility (legacy YOLOX exp)
  # Ultralytics YOLO11 weight path, e.g.:
  #   "yolo11n.pt" or "weights/yolo11n.pt"
  ckpt_path: "weights/yolo11n.pt"
  input_size: [640, 640]
  conf_thre: 0.3
  nms_thre: 0.45

bytetrack:
  track_thresh: 0.5
  track_buffer: 30
  match_thresh: 0.8
  frame_rate: 30

privacy:
  enable: true
  epsilon: 1.0
  delta: 1.0e-5
  sensitivity: 1.0
  sigma_cap: 25.0        # Cap sigma when epsilon is very small
  sensitive_classes: ["person"]   # Can extend to face/person/plate etc.
  apply_on: "bbox"       # "bbox" or "feature" (bbox implemented)

ncp:
  enable: true
  mode: "class_weight"   # "class_weight" | "score_gate" | "combined"
  # class_weight: stronger penalty (more noise) for sensitive classes; preserve non-sensitive
  sensitive_weight: 1.0
  nonsensitive_weight: 0.2
  # score_gate: lower-confidence targets get more penalty; combined = class_weight * score_gate scale
  score_gate_thre: 0.35

temporal:
  enable: true
  method: "kalman_smooth"  # Approx temporal CRF: Kalman + soft consistency
  alpha: 0.7               # Higher = trust history more